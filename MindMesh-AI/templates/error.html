{% extends "base.html" %}

{% block content %}
<div class="flex-1 flex flex-col items-center justify-center min-h-[60vh] text-center p-8">
    <div class="glass-panel p-10 rounded-3xl max-w-lg w-full shadow-2xl relative overflow-hidden">
        <!-- Background Glow -->
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-accent/20 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-purple-500/20 rounded-full blur-3xl"></div>
        
        <img src="/assets/logo.png" alt="MindMesh AI" class="w-24 h-24 mx-auto mb-6 relative z-10" onerror="this.src='https://via.placeholder.com/96?text=MM'">
        
        <h1 class="text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-500 mb-4 relative z-10">
            {{ status_code }}
        </h1>
        
        <h2 class="text-2xl font-bold mb-4 text-white relative z-10">
            Oops! Something went wrong.
        </h2>
        
        <p class="text-gray-400 mb-8 relative z-10">
            {{ message }}
        </p>
        
        <a href="/" class="inline-block bg-accent hover:bg-accent/80 text-white font-bold py-3 px-8 rounded-xl transition-all hover:scale-105 active:scale-95 shadow-lg shadow-accent/20 relative z-10">
            Return to Dashboard
        </a>
    </div>
</div>
{% endblock %}
