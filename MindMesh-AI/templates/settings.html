{% extends "base.html" %}

{% block content %}
<div class="p-8 max-w-4xl mx-auto w-full">
    <div class="mb-8">
        <h2 class="text-3xl font-bold mb-2">Settings</h2>
        <p class="text-gray-400">Configure your LLM providers and preferences.</p>
    </div>

    <!-- Provider Health -->
    <div class="glass-panel rounded-2xl p-6 mb-8">
        <h3 class="text-xl font-bold mb-4 flex items-center gap-2">
            <span>🩺</span> API Health Checks
        </h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            {% for key, val in health.items() %}
            <div class="p-4 rounded-xl bg-black/30 border border-white/5 flex flex-col">
                <div class="flex justify-between items-center mb-2">
                    <span class="font-bold capitalize">{{ key }}</span>
                    <div class="w-3 h-3 rounded-full {% if val[0] %}bg-green-500{% else %}bg-red-500{% endif %}"></div>
                </div>
                <span class="text-sm text-gray-400">{{ val[1] }}</span>
            </div>
            {% endfor %}
        </div>
    </div>

    <!-- Configuration Form -->
    <div class="glass-panel rounded-2xl p-8">
        <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
            <span>⚙️</span> Model Configuration
        </h3>
        
        <form hx-post="/api/settings" hx-target="#settings-result">
            <div class="space-y-6">
                
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Web Search Mode</label>
                    <select name="web_search_mode" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-accent transition-colors appearance-none">
                        <option value="smart" {% if web_search_mode == 'smart' %}selected{% endif %}>Smart Mode (Default)</option>
                        <option value="course" {% if web_search_mode == 'course' %}selected{% endif %}>Course Only</option>
                        <option value="hybrid" {% if web_search_mode == 'hybrid' %}selected{% endif %}>Hybrid</option>
                        <option value="web" {% if web_search_mode == 'web' %}selected{% endif %}>Web Only</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Active LLM Provider</label>
                    <select name="provider" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-accent transition-colors appearance-none">
                        <option value="gemini" {% if provider == 'gemini' %}selected{% endif %}>Google Gemini (Primary)</option>
                        <option value="groq" {% if provider == 'groq' %}selected{% endif %}>Groq (Fast Inference)</option>
                        <option value="ollama" {% if provider == 'ollama' %}selected{% endif %}>Ollama (Local)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Gemini Model</label>
                    <input type="text" name="gemini_model" value="{{ gemini_model }}"
                           class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-accent transition-colors">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Groq Model</label>
                    <input type="text" name="groq_model" value="{{ groq_model }}"
                           class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-accent transition-colors">
                </div>

                <div class="pt-4">
                    <button type="submit" class="bg-white/10 hover:bg-white/20 text-white font-bold py-3 px-8 rounded-xl transition-colors border border-white/10">
                        Save Changes
                    </button>
                </div>
                
                <div id="settings-result"></div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
