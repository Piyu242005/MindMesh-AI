apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mindmesh-ingress
  namespace: mindmesh
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - mindmesh.example.com
    secretName: mindmesh-tls
  rules:
  - host: mindmesh.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mindmesh-service
            port:
              number: 8000
